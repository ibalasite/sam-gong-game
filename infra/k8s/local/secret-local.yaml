## LOCAL TESTING ONLY — DO NOT USE IN PRODUCTION
## All values are base64-encoded dev defaults
## DB_PASSWORD=dev_password_change_me  → echo -n "dev_password_change_me" | base64
## REDIS_PASSWORD=dev_redis_password   → echo -n "dev_redis_password" | base64
## JWT keys are placeholder (replace with: scripts/secrets/generate-jwt-keys.sh)

apiVersion: v1
kind: Secret
metadata:
  name: sam-gong-secrets
  namespace: sam-gong-local
  labels:
    env: local
    app.kubernetes.io/managed-by: devsop
type: Opaque
stringData:
  DB_PASSWORD: "dev_password_change_me"
  REDIS_PASSWORD: "dev_redis_password"
  OTP_API_KEY: "dev_otp_key_placeholder"
  JWT_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    PLACEHOLDER_REPLACE_WITH_REAL_KEY
    Run: bash scripts/secrets/generate-jwt-keys.sh
    Then: kubectl create secret generic sam-gong-secrets \
      --from-file=JWT_PRIVATE_KEY=secrets/jwt_private.pem \
      --from-file=JWT_PUBLIC_KEY=secrets/jwt_public.pem \
      -n sam-gong-local --dry-run=client -o yaml | kubectl apply -f -
    -----END RSA PRIVATE KEY-----
  JWT_PUBLIC_KEY: |
    -----BEGIN PUBLIC KEY-----
    PLACEHOLDER_REPLACE_WITH_REAL_KEY
    -----END PUBLIC KEY-----
